repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        files: ^(LibraryGames/|tests/|main\.py|pyproject\.toml)$
      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        files: ^(LibraryGames/|tests/|main\.py|pyproject\.toml|uv\.lock)$